<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Học sinh</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#2b0b59;
      --bg2:#120421;
      --panel:rgba(20,16,45,.62);
      --line:rgba(255,255,255,.08);
      --white:#ffffff;
      --muted:#d5d8f8;
      --red:#e21b3c;
      --blue:#1368ce;
      --yellow:#d89e00;
      --green:#26890c;
      --shadow:0 16px 36px rgba(0,0,0,.22);
    }

    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; min-height:100%; }
    body{
      font-family:"Be Vietnam Pro", Arial, sans-serif;
      min-height:100vh;
      color:var(--white);
      background:
        radial-gradient(circle at 10% 10%, rgba(168,85,247,.22), transparent 20%),
        radial-gradient(circle at 90% 10%, rgba(59,130,246,.18), transparent 18%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
    }

    .wrap{
      width:100%;
      max-width:560px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:18px;
      backdrop-filter:blur(10px);
    }

    h1,h2,p{ margin:0; }

    .join-title{
      font-size:34px;
      font-weight:900;
      letter-spacing:-0.02em;
      margin-bottom:8px;
    }

    .subtitle{
      color:var(--muted);
      line-height:1.45;
      font-size:16px;
      margin-bottom:16px;
    }

    input{
      width:100%;
      border:none;
      outline:none;
      background:rgba(0,0,0,.18);
      color:#fff;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.06);
      padding:14px 14px;
      font-size:20px;
      font-weight:800;
      font-family:inherit;
      margin-bottom:12px;
    }

    input::placeholder{
      color:#d4d7ff;
      opacity:.85;
    }

    .join-btn{
      width:100%;
      height:54px;
      border:none;
      border-radius:16px;
      cursor:pointer;
      font-family:inherit;
      font-size:18px;
      font-weight:900;
      color:#fff;
      background:linear-gradient(135deg,#8b5cf6,#3b82f6);
      box-shadow:var(--shadow);
    }

    .join-btn:hover{ transform:translateY(-1px); }

    #controller{
      display:none;
    }

    .meta{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      margin-bottom:14px;
    }

    .meta-box{
      background:rgba(255,255,255,.06);
      border-radius:16px;
      padding:12px;
      text-align:center;
    }

    .meta-k{
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-weight:800;
      margin-bottom:6px;
    }

    .meta-v{
      font-size:24px;
      line-height:1;
      font-weight:900;
    }

    .status-card{
      background:#fff;
      color:#111827;
      border-radius:18px;
      padding:16px 18px;
      margin-bottom:14px;
      box-shadow:var(--shadow);
      text-align:center;
    }

    .status-line{
      font-size:28px;
      font-weight:900;
      line-height:1.2;
      letter-spacing:-0.02em;
      margin-bottom:6px;
    }

    .status-sub{
      color:#4b5563;
      font-size:15px;
      line-height:1.4;
      font-weight:700;
    }

    .answer-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .answer-btn{
      min-height:116px;
      border:none;
      border-radius:22px;
      cursor:pointer;
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      overflow:hidden;
      transition:.15s ease;
    }

    .answer-btn:hover{ transform:translateY(-1px); }
    .answer-btn.disabled{
      opacity:.34;
      pointer-events:none;
    }

    .answer-btn.a{ background:linear-gradient(135deg, #ff3355, #d4145a); }
    .answer-btn.b{ background:linear-gradient(135deg, #1f7aff, #0052cc); }
    .answer-btn.c{ background:linear-gradient(135deg, #ffd54a, #f59e0b); }
    .answer-btn.d{ background:linear-gradient(135deg, #34d26a, #16803b); }

    .shape{
      width:68px;
      height:68px;
      position:relative;
      flex:0 0 auto;
    }

    .shape::before{
      content:"";
      position:absolute;
      inset:0;
      margin:auto;
    }

    .shape.triangle::before{
      width:0;
      height:0;
      border-left:30px solid transparent;
      border-right:30px solid transparent;
      border-bottom:52px solid rgba(255,255,255,.96);
      top:0;
    }

    .shape.diamond::before{
      width:38px;
      height:38px;
      background:rgba(255,255,255,.96);
      transform:rotate(45deg);
      top:15px;
      left:15px;
    }

    .shape.circle::before{
      width:42px;
      height:42px;
      border-radius:50%;
      background:rgba(255,255,255,.96);
      top:13px;
      left:13px;
    }

    .shape.square::before{
      width:40px;
      height:40px;
      border-radius:6px;
      background:rgba(255,255,255,.96);
      top:14px;
      left:14px;
    }

    .footer-note{
      margin-top:12px;
      text-align:center;
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
    }

    @media (max-width: 640px){
      .meta{ grid-template-columns:1fr; }
      .answer-grid{ grid-template-columns:1fr 1fr; }
      .status-line{ font-size:23px; }
      .answer-btn{ min-height:96px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="joinCard" class="card">
      <h1 class="join-title">Vào phòng thi</h1>
      <div class="subtitle">Màn hình này chỉ hiện tên, mã phòng và 4 nút bấm đáp án. Câu hỏi được giáo viên chiếu trên bảng.</div>

      <input id="roomIdInput" placeholder="Nhập mã phòng" value="11A1" />
      <input id="nameInput" placeholder="Nhập tên học sinh" />
      <button id="joinBtn" class="join-btn">Vào phòng</button>
    </div>

    <div id="controller">
      <div class="card">
        <div class="meta">
          <div class="meta-box">
            <div class="meta-k">Phòng</div>
            <div id="roomBadge" class="meta-v">----</div>
          </div>
          <div class="meta-box">
            <div class="meta-k">Điểm</div>
            <div id="scoreBadge" class="meta-v">0</div>
          </div>
          <div class="meta-box">
            <div class="meta-k">Trạng thái</div>
            <div id="statusBadge" class="meta-v" style="font-size:20px;">Chờ</div>
          </div>
        </div>

        <div class="status-card">
          <div id="promptLine" class="status-line">Chờ giáo viên bắt đầu.</div>
          <div id="answerStatus" class="status-sub">Bạn chưa chọn đáp án.</div>
        </div>

        <div id="answerGrid" class="answer-grid">
          <button class="answer-btn a disabled" data-answer="A" aria-label="A">
            <div class="shape triangle"></div>
          </button>
          <button class="answer-btn b disabled" data-answer="B" aria-label="B">
            <div class="shape diamond"></div>
          </button>
          <button class="answer-btn c disabled" data-answer="C" aria-label="C">
            <div class="shape circle"></div>
          </button>
          <button class="answer-btn d disabled" data-answer="D" aria-label="D">
            <div class="shape square"></div>
          </button>
        </div>

        <div class="footer-note">Nhìn câu hỏi trên bảng rồi chọn biểu tượng tương ứng trên điện thoại.</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      get,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBVbElFcTs66KuPlNZA7io48u7gv2Fv9EE",
      authDomain: "kahoot-toan-11.firebaseapp.com",
      databaseURL: "https://kahoot-toan-11-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "kahoot-toan-11",
      storageBucket: "kahoot-toan-11.firebasestorage.app",
      messagingSenderId: "344110560956",
      appId: "1:344110560956:web:a1185a025aefa7c40682b9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const joinCard = document.getElementById("joinCard");
    const controller = document.getElementById("controller");
    const roomIdInput = document.getElementById("roomIdInput");
    const nameInput = document.getElementById("nameInput");
    const joinBtn = document.getElementById("joinBtn");

    const roomBadge = document.getElementById("roomBadge");
    const scoreBadge = document.getElementById("scoreBadge");
    const statusBadge = document.getElementById("statusBadge");
    const promptLine = document.getElementById("promptLine");
    const answerStatus = document.getElementById("answerStatus");
    const answerButtons = [...document.querySelectorAll(".answer-btn")];

    let studentId = localStorage.getItem("quiz_student_id") || "";
    let roomId = "";
    let studentName = "";
    let currentRoomUnsubscribe = null;

    if (!studentId) {
      studentId = "s_" + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem("quiz_student_id", studentId);
    }

    function getRoomPath() {
      return `rooms/${roomId}`;
    }

    function getPlayerPath() {
      return `rooms/${roomId}/players/${studentId}`;
    }

    function getAnswerPath() {
      return `rooms/${roomId}/answers/${studentId}`;
    }

    function disableButtons() {
      answerButtons.forEach(btn => btn.classList.add("disabled"));
    }

    function enableButtons() {
      answerButtons.forEach(btn => btn.classList.remove("disabled"));
    }

    async function joinRoom() {
      roomId = roomIdInput.value.trim().toUpperCase();
      studentName = nameInput.value.trim();

      if (!roomId || !studentName) {
        alert("Hãy nhập mã phòng và tên.");
        return;
      }

      try {
        const snapshot = await get(ref(db, getRoomPath()));
        if (!snapshot.exists()) {
          alert("Phòng chưa tồn tại. Hãy nhờ giáo viên tạo phòng trước.");
          return;
        }

        const oldPlayer = snapshot.val().players?.[studentId];
        const oldScore = oldPlayer?.score || 0;

        await set(ref(db, getPlayerPath()), {
          name: studentName,
          score: oldScore,
          joinedAt: Date.now()
        });

        localStorage.setItem("quiz_room_id", roomId);
        localStorage.setItem("quiz_student_name", studentName);

        roomBadge.textContent = roomId;
        joinCard.style.display = "none";
        controller.style.display = "block";

        attachRoomListener();
      } catch (err) {
        console.error("Lỗi vào phòng:", err);
        alert("Lỗi vào phòng: " + (err?.message || err));
      }
    }

    async function submitAnswer(answer) {
      const snapshot = await get(ref(db, getRoomPath()));
      if (!snapshot.exists()) return;

      const state = snapshot.val();
      if (state.status !== "question_open") return;
      if (state.answers?.[studentId]) return;

      await set(ref(db, getAnswerPath()), {
        choice: answer,
        answeredAt: Date.now()
      });

      answerStatus.textContent = `Bạn đã chọn đáp án ${answer}.`;
      disableButtons();
    }

    function attachRoomListener() {
      if (currentRoomUnsubscribe) {
        currentRoomUnsubscribe();
        currentRoomUnsubscribe = null;
      }

      currentRoomUnsubscribe = onValue(ref(db, getRoomPath()), (snapshot) => {
        const state = snapshot.val();

        if (!state) {
          alert("Phòng đã bị xoá.");
          location.reload();
          return;
        }

        const player = state.players?.[studentId];
        scoreBadge.textContent = player?.score || 0;

        const statusMap = {
          waiting: "Chờ",
          question_open: "Làm bài",
          answer_revealed: "Xếp hạng",
          finished: "Xong"
        };
        statusBadge.textContent = statusMap[state.status] || "Chờ";

        const myAnswerRaw = state.answers?.[studentId] || null;
        const myAnswer = typeof myAnswerRaw === "string"
          ? myAnswerRaw
          : (myAnswerRaw?.choice || null);

        if (state.phase === "lobby") {
          promptLine.textContent = "Chờ giáo viên bắt đầu.";
          answerStatus.textContent = "Bạn chưa chọn đáp án.";
          disableButtons();
        } else if (state.phase === "question") {
          promptLine.textContent = "Chọn đáp án nhanh nhất có thể.";
          if (myAnswer) {
            answerStatus.textContent = `Bạn đã chọn đáp án ${myAnswer}.`;
            disableButtons();
          } else {
            answerStatus.textContent = "Bạn chưa chọn đáp án.";
            enableButtons();
          }
        } else if (state.phase === "leaderboard") {
          promptLine.textContent = "Đang chờ bảng xếp hạng tạm thời.";
          answerStatus.textContent = myAnswer
            ? `Bạn đã trả lời ${myAnswer}.`
            : "Bạn chưa gửi đáp án câu này.";
          disableButtons();
        } else if (state.phase === "final") {
          promptLine.textContent = "Trò chơi đã kết thúc.";
          answerStatus.textContent = "Chờ xem kết quả cuối cùng trên màn hình giáo viên.";
          disableButtons();
        } else {
          promptLine.textContent = "Chờ giáo viên bắt đầu.";
          answerStatus.textContent = "Bạn chưa chọn đáp án.";
          disableButtons();
        }
      });
    }

    joinBtn.addEventListener("click", joinRoom);

    answerButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        if (btn.classList.contains("disabled")) return;
        submitAnswer(btn.dataset.answer);
      });
    });

    const savedRoom = localStorage.getItem("quiz_room_id");
    const savedName = localStorage.getItem("quiz_student_name");
    if (savedRoom) roomIdInput.value = savedRoom;
    if (savedName) nameInput.value = savedName;
  </script>
</body>
</html>
